<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BogenScope</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --accent: #C9FF3D; --bg: #000; --panel: rgba(0,0,0,0.52); --border: rgba(255,255,255,0.14); }
  body { background: #000; width: 100vw; height: 100dvh; overflow: hidden; font-family: monospace; touch-action: none; }

  /* ── Camera ── */
  #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

  /* ── Canvas (overlays) ── */
  #canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

  /* ── Vignette ── */
  #vignette { position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: radial-gradient(circle at 50% 42%, transparent 32%, rgba(0,0,0,0.80) 62%); }

  /* ── UI layer ── */
  #ui { position: fixed; inset: 0; z-index: 4; }

  /* ── Start screen ── */
  #startScreen { position: fixed; inset: 0; z-index: 10; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
  #startScreen h1 { color: var(--accent); font-size: 2.4rem; letter-spacing: 0.08em; }
  #startScreen p  { color: rgba(255,255,255,0.55); font-size: 0.85rem; text-align: center; padding: 0 32px; line-height: 1.6; }
  #startBtn { background: var(--accent); color: #000; border: none; border-radius: 14px;
    padding: 16px 40px; font-size: 1.1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; }

  /* ── Level ── */
  #levelWrap { position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
  #levelTrack { position: relative; width: 120px; height: 16px; background: rgba(0,0,0,0.5);
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.22); overflow: visible; }
  #levelCenter { position: absolute; left: 50%; top: 0; bottom: 0; width: 1.5px; background: rgba(255,255,255,0.4); transform: translateX(-50%); }
  #levelBubble { position: absolute; top: 2px; width: 12px; height: 12px; border-radius: 50%;
    background: #3DDC84; transition: left 0.1s, background 0.2s; transform: translateX(-50%); left: 50%; }
  #levelVal { font-size: 10px; color: #3DDC84; transition: color 0.2s; }

  /* ── Distance HUD ── */
  #distHud { position: absolute; top: 48px; right: 12px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  #distBox { background: var(--panel); border-radius: 10px; border: 1.5px solid var(--border);
    padding: 7px 13px; display: flex; align-items: baseline; gap: 4px; cursor: pointer; }
  #distVal { font-size: 28px; font-weight: 700; color: var(--accent); }
  #distUnit { font-size: 12px; color: rgba(255,255,255,0.55); }
  #windBox { background: rgba(0,0,0,0.42); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 10px; font-size: 11px; color: rgba(255,255,255,0.6); }

  /* ── Profile button ── */
  #profileBtn { position: absolute; top: 48px; left: 12px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px;
    color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

  /* ── Mini view ── */
  #miniWrap { position: absolute; right: 12px; bottom: 92px;
    width: 90px; height: 90px; border-radius: 10px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.35); box-shadow: 0 2px 12px rgba(0,0,0,0.6); }
  #miniVideo { width: 100%; height: 100%; object-fit: cover; transform: scale(3); }
  #miniCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #miniLabel { position: absolute; top: 3px; left: 4px; font-size: 9px;
    background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.7); padding: 1px 4px; border-radius: 3px; }

  /* ── Zoom control ── */
  #zoomCtrl { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 10px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 6px; }
  #zoomCtrl button { width: 32px; height: 32px; border-radius: 8px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
    color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #zoomSlider { writing-mode: vertical-lr; direction: rtl; -webkit-appearance: slider-vertical;
    width: 28px; height: 120px; accent-color: var(--accent); cursor: pointer; }
  #zoomVal { font-size: 11px; color: var(--accent); font-weight: 700; }

  /* ── Toggle bar ── */
  #toggleBar { position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.78), transparent);
    padding: 10px 8px 20px; display: flex; justify-content: space-around; gap: 5px; }
  .tog { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    width: 46px; height: 50px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.75); cursor: pointer;
    font-size: 8px; transition: background 0.15s, border-color 0.15s; user-select: none; }
  .tog .icon { font-size: 17px; line-height: 1; }
  .tog.on { background: var(--accent); border-color: var(--accent); color: #000; }

  /* ── Bottom sheet ── */
  #sheet { position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,0.65); display: none; align-items: flex-end; }
  #sheet.open { display: flex; }
  #sheetBox { width: 100%; max-height: 80dvh; overflow-y: auto;
    background: #1a1a1a; border-radius: 20px 20px 0 0; padding: 16px 16px 32px;
    border: 1px solid rgba(255,255,255,0.08); }
  #sheetBox h2 { color: #fff; font-size: 15px; font-weight: 600; margin-bottom: 12px; font-family: sans-serif; }
  .sheetRow { display: flex; justify-content: space-between; align-items: center;
    background: #262626; border-radius: 12px; padding: 13px 14px; margin-bottom: 6px; cursor: pointer; }
  .sheetRow span { color: #fff; font-size: 14px; font-family: sans-serif; }
  .sw { width: 44px; height: 24px; border-radius: 12px; background: #555; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .sw.on { background: var(--accent); }
  .sw::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px;
    border-radius:50%; background:#fff; transition: left 0.2s; }
  .sw.on::after { left: 22px; }
  .pinRow { display: flex; align-items: center; gap: 12px; background: #262626;
    border-radius: 12px; padding: 13px 14px; margin-bottom: 6px; cursor: pointer;
    border: 1.5px solid transparent; }
  .pinRow.active { border-color: var(--accent); }
  .pinDot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .pinLabel { color: #fff; font-family: monospace; font-size: 14px; flex: 1; }
  .pinActive { color: var(--accent); font-size: 10px; font-weight: 700; }
  .sheetClose { float: right; background: none; border: none; color: rgba(255,255,255,0.55); font-size: 22px; cursor: pointer; }
  .addBtn { width:100%; padding:13px; border-radius:12px; margin-top:4px;
    background:#262626; border:1px dashed rgba(255,255,255,0.22);
    color:rgba(255,255,255,0.65); font-size:13px; cursor:pointer; font-family:sans-serif; }

  /* ── Error ── */
  #errScreen { position:fixed;inset:0;z-index:9;background:#000;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center; }
  #errScreen.show { display:flex; }
  #errScreen p { color:rgba(255,255,255,0.7);line-height:1.6;font-family:sans-serif; }
  #retryBtn { background:var(--accent);color:#000;border:none;border-radius:12px;
    padding:14px 32px;font-size:1rem;font-weight:700;cursor:pointer; }
</style>
</head>
<body>

<!-- ── Start screen ── -->
<div id="startScreen">
  <h1>BOGENSCOPE</h1>
  <p>Digitales Visier fuer Compound- und Recurvebögen.<br>Die App benoetigt Zugriff auf deine Kamera.</p>
  <button id="startBtn">Kamera starten</button>
</div>

<!-- ── Error screen ── -->
<div id="errScreen">
  <p id="errMsg">Kamerazugriff wurde verweigert.<br>Bitte in den Browser-Einstellungen erlauben und neu laden.</p>
  <button id="retryBtn">Erneut versuchen</button>
</div>

<!-- ── Camera ── -->
<video id="video" autoplay playsinline muted></video>

<!-- ── Overlay canvas ── -->
<canvas id="canvas"></canvas>

<!-- ── Vignette ── -->
<div id="vignette"></div>

<!-- ── UI ── -->
<div id="ui" style="display:none">

  <!-- Level -->
  <div id="levelWrap">
    <div id="levelTrack">
      <div id="levelCenter"></div>
      <div id="levelBubble"></div>
    </div>
    <div id="levelVal">0.0°</div>
  </div>

  <!-- Distance HUD -->
  <div id="distHud">
    <div id="distBox" onclick="openSheet('pins')">
      <span id="distVal">30</span>
      <span id="distUnit">m</span>
    </div>
    <div id="windBox">💨 3 m/s NW</div>
  </div>

  <!-- Profile button -->
  <div id="profileBtn" onclick="openSheet('settings')">
    Compound – Jagd ▾
  </div>

  <!-- Mini view -->
  <div id="miniWrap">
    <video id="miniVideo" autoplay playsinline muted></video>
    <canvas id="miniCanvas"></canvas>
    <div id="miniLabel">3x</div>
  </div>

  <!-- Zoom control -->
  <div id="zoomCtrl">
    <button onclick="changeZoom(1)">+</button>
    <input id="zoomSlider" type="range" min="1" max="20" step="0.5" value="1" oninput="onZoomSlider(this.value)">
    <button onclick="changeZoom(-1)">−</button>
    <div id="zoomVal">1x</div>
  </div>

  <!-- Toggle bar -->
  <div id="toggleBar">
    <div class="tog on" id="tog-cross"   onclick="tog('cross')"   ><span class="icon">✛</span>Kreuz</div>
    <div class="tog on" id="tog-circle"  onclick="tog('circle')"  ><span class="icon">○</span>Kreis</div>
    <div class="tog on" id="tog-point"   onclick="tog('point')"   ><span class="icon">◎</span>Punkt</div>
    <div class="tog on" id="tog-pins"    onclick="tog('pins')"    ><span class="icon">📍</span>Pins</div>
    <div class="tog on" id="tog-level"   onclick="tog('level')"   ><span class="icon">⊟</span>Level</div>
    <div class="tog on" id="tog-mini"    onclick="tog('mini')"    ><span class="icon">▣</span>Mini</div>
    <div class="tog on" id="tog-dist"    onclick="tog('dist')"    ><span class="icon">m</span>Dist</div>
  </div>

</div><!-- /ui -->

<!-- ── Bottom sheet ── -->
<div id="sheet" onclick="closeSheet()">
  <div id="sheetBox" onclick="event.stopPropagation()">
    <div id="sheetContent"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────
const state = {
  cross: true, circle: true, point: true,
  pins: true, level: true, mini: true, dist: true,
  zoom: 1,
  tilt: 0,
  activePin: 30,
};

const PINS = [
  { d: 10, color: '#FF4136', oy: 0.16 },
  { d: 20, color: '#FF8C00', oy: 0.09 },
  { d: 30, color: '#FFD60A', oy: 0.02 },
  { d: 40, color: '#2ECC71', oy: -0.05 },
  { d: 50, color: '#2E86FF', oy: -0.12 },
  { d: 60, color: '#B14EFF', oy: -0.19 },
];

// ─────────────────────────────────────────────────
// Camera
// ─────────────────────────────────────────────────
let stream = null;
let track  = null;

document.getElementById('startBtn').onclick = startCamera;
document.getElementById('retryBtn').onclick  = () => {
  document.getElementById('errScreen').classList.remove('show');
  startCamera();
};

async function startCamera() {
  document.getElementById('startScreen').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    // Same stream for mini view
    const mini = document.getElementById('miniVideo');
    mini.srcObject = stream;
    await mini.play();

    track = stream.getVideoTracks()[0];
    document.getElementById('ui').style.display = 'block';

    resizeCanvas();
    requestAnimationFrame(drawLoop);
    initSensors();
  } catch(e) {
    document.getElementById('errMsg').textContent =
      'Kamerazugriff nicht moeglich: ' + e.message +
      '\n\nBitte HTTPS oder localhost verwenden und Kamera-Berechtigung erteilen.';
    document.getElementById('errScreen').classList.add('show');
  }
}

// ─────────────────────────────────────────────────
// Zoom (via camera constraints)
// ─────────────────────────────────────────────────
function changeZoom(delta) {
  const slider = document.getElementById('zoomSlider');
  const newVal = Math.max(1, Math.min(20, parseFloat(slider.value) + delta));
  slider.value = newVal;
  applyZoom(newVal);
}

function onZoomSlider(v) { applyZoom(parseFloat(v)); }

async function applyZoom(z) {
  state.zoom = z;
  document.getElementById('zoomVal').textContent = z.toFixed(1) + 'x';
  if (!track) return;
  try {
    const caps = track.getCapabilities();
    if (caps.zoom) {
      const max = Math.min(caps.zoom.max, 20);
      const actual = Math.min(z, max);
      await track.applyConstraints({ advanced: [{ zoom: actual }] });
      document.getElementById('zoomSlider').max = max;
    }
  } catch(_) {}
}

// ─────────────────────────────────────────────────
// Canvas resize
// ─────────────────────────────────────────────────
function resizeCanvas() {
  const c = document.getElementById('canvas');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

// ─────────────────────────────────────────────────
// Draw loop (overlays)
// ─────────────────────────────────────────────────
function drawLoop() {
  requestAnimationFrame(drawLoop);
  const c  = document.getElementById('canvas');
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);

  const cx = c.width / 2;
  const cy = c.height * 0.42;
  const r  = Math.min(cx * 0.88, cy * 0.88);

  // Scope circle
  if (state.circle) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(201,255,61,0.88)';
    ctx.lineWidth = 1.8;
    ctx.stroke();
  }

  // Crosshair
  if (state.cross) {
    ctx.strokeStyle = 'rgba(201,255,61,0.88)';
    ctx.lineWidth = 1.5;
    const gap = 20;
    // horizontal
    ctx.beginPath(); ctx.moveTo(cx - r, cy); ctx.lineTo(cx - gap, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + r, cy); ctx.stroke();
    // vertical
    ctx.beginPath(); ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy - gap); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + r); ctx.stroke();
    // ticks
    ctx.strokeStyle = 'rgba(201,255,61,0.5)';
    ctx.lineWidth = 1.2;
    [0.3, 0.55, 0.75, 0.9].forEach(f => {
      const x = cx + r * f;
      ctx.beginPath(); ctx.moveTo(x, cy - 5); ctx.lineTo(x, cy + 5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - r*f, cy - 5); ctx.lineTo(cx - r*f, cy + 5); ctx.stroke();
    });
  }

  // Aim point
  if (state.point) {
    ctx.beginPath();
    ctx.arc(cx, cy, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = '#C9FF3D';
    ctx.fill();
  }

  // Pins
  if (state.pins) {
    PINS.forEach(pin => {
      const px = cx;
      const py = cy + pin.oy * c.height;
      const isActive = pin.d === state.activePin;
      // dot
      ctx.beginPath();
      ctx.arc(px, py, isActive ? 6.5 : 4, 0, Math.PI * 2);
      ctx.fillStyle = pin.color;
      ctx.fill();
      // ring
      if (isActive) {
        ctx.beginPath();
        ctx.arc(px, py, 9.5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      // label
      ctx.font = `${isActive ? 'bold ' : ''}${isActive ? 12 : 10}px monospace`;
      ctx.fillStyle = pin.color;
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 4;
      ctx.fillText(pin.d + 'm', px + 14, py + 4);
      ctx.shadowBlur = 0;
    });
  }

  // Mini canvas crosshair
  const mc  = document.getElementById('miniCanvas');
  const mw  = mc.width  = mc.offsetWidth;
  const mh  = mc.height = mc.offsetHeight;
  const mctx = mc.getContext('2d');
  mctx.clearRect(0, 0, mw, mh);
  mctx.strokeStyle = 'rgba(201,255,61,0.85)';
  mctx.lineWidth = 1;
  mctx.beginPath(); mctx.moveTo(0, mh/2); mctx.lineTo(mw, mh/2); mctx.stroke();
  mctx.beginPath(); mctx.moveTo(mw/2, 0); mctx.lineTo(mw/2, mh); mctx.stroke();
}

// ─────────────────────────────────────────────────
// Sensors (level)
// ─────────────────────────────────────────────────
function initSensors() {
  if (window.DeviceMotionEvent) {
    // Request permission on iOS 13+
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission().catch(() => {});
    }
    let lastTilt = 0;
    window.addEventListener('devicemotion', e => {
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      const roll = Math.atan2(acc.x, acc.z) * (180 / Math.PI);
      lastTilt = lastTilt * 0.8 + roll * 0.2; // low-pass
      updateLevel(lastTilt);
    });
  }
}

function updateLevel(deg) {
  state.tilt = deg;
  const frac = Math.max(-1, Math.min(1, deg / 15));
  const pxOffset = frac * 48; // track is 120px, bubble can move ±48px
  const ok = Math.abs(deg) < 1.5;
  const col = ok ? '#3DDC84' : '#FFB000';
  const bubble = document.getElementById('levelBubble');
  bubble.style.left = `calc(50% + ${pxOffset}px)`;
  bubble.style.background = col;
  const lv = document.getElementById('levelVal');
  lv.textContent = (deg >= 0 ? '+' : '') + deg.toFixed(1) + '°';
  lv.style.color = col;
}

// ─────────────────────────────────────────────────
// Toggles
// ─────────────────────────────────────────────────
function tog(key) {
  state[key] = !state[key];
  document.getElementById('tog-' + key).classList.toggle('on', state[key]);
  // Show/hide level widget
  if (key === 'level') document.getElementById('levelWrap').style.display = state.level ? '' : 'none';
  if (key === 'mini')  document.getElementById('miniWrap').style.display  = state.mini  ? '' : 'none';
  if (key === 'dist')  document.getElementById('distHud').style.display   = state.dist  ? '' : 'none';
}

// ─────────────────────────────────────────────────
// Sheets
// ─────────────────────────────────────────────────
function openSheet(type) {
  const content = document.getElementById('sheetContent');
  if (type === 'settings') {
    content.innerHTML = `
      <button class="sheetClose" onclick="closeSheet()">✕</button>
      <h2>Overlays</h2>
      ${[
        ['cross','Fadenkreuz'],['circle','Scope-Kreis'],['point','Zielpunkt'],
        ['pins','Distanz-Pins'],['level','Wasserwaage'],['mini','Miniaturansicht'],['dist','Entfernungsanzeige']
      ].map(([k,l]) => `
        <div class="sheetRow" onclick="tog('${k}');renderSheet('settings')">
          <span>${l}</span>
          <div class="sw ${state[k] ? 'on' : ''}"></div>
        </div>`).join('')}`;
  } else if (type === 'pins') {
    content.innerHTML = `
      <button class="sheetClose" onclick="closeSheet()">✕</button>
      <h2>Distanz-Pins</h2>
      ${PINS.map(p => `
        <div class="pinRow ${p.d === state.activePin ? 'active' : ''}" onclick="selectPin(${p.d})">
          <div class="pinDot" style="background:${p.color}"></div>
          <span class="pinLabel">${p.d} m</span>
          ${p.d === state.activePin ? '<span class="pinActive">AKTIV</span>' : ''}
        </div>`).join('')}
      <button class="addBtn">＋ Neue Distanz einschießen (kommt in Phase 4)</button>`;
  }
  document.getElementById('sheet').classList.add('open');
}

function renderSheet(type) { openSheet(type); } // re-render after toggle

function closeSheet() { document.getElementById('sheet').classList.remove('open'); }

function selectPin(d) {
  state.activePin = d;
  document.getElementById('distVal').textContent = d;
  // Update border color of distBox to match pin color
  const pin = PINS.find(p => p.d === d);
  document.getElementById('distBox').style.borderColor = pin ? pin.color + 'cc' : 'var(--border)';
  document.getElementById('distVal').style.color = pin ? pin.color : 'var(--accent)';
  closeSheet();
}
</script>
</body>
</html>

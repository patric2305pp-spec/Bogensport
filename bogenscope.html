<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BogenScope</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --accent:#C9FF3D; --panel:rgba(0,0,0,0.52); --border:rgba(255,255,255,0.13); }
body { background:#000; width:100vw; height:100dvh; overflow:hidden; touch-action:none; user-select:none; font-family:monospace; }

/* Video hidden – drawn on canvas */
#video { position:fixed; left:-9999px; opacity:0; pointer-events:none; }

/* Full-screen canvas */
#canvas { position:fixed; inset:0; width:100%; height:100%; z-index:2; display:block; }

/* Vignette */
#vignette { position:fixed; inset:0; z-index:3; pointer-events:none;
  background:radial-gradient(circle at 50% 44%, transparent 30%, rgba(0,0,0,0.80) 60%); }

/* UI layer – pointer-events managed per child */
#ui { position:fixed; inset:0; z-index:4; pointer-events:none; display:none; }
#ui > * { pointer-events:auto; }

/* ── Start ── */
#startScreen { position:fixed; inset:0; z-index:10; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
#startScreen h1 { color:var(--accent); font-size:2.6rem; letter-spacing:.1em; }
#startScreen p  { color:rgba(255,255,255,.5); font-size:.85rem; text-align:center; padding:0 36px; line-height:1.7; }
#startBtn { background:var(--accent); color:#000; border:none; border-radius:14px;
  padding:16px 44px; font-size:1.1rem; font-weight:700; cursor:pointer; }

/* ── Error ── */
#errScreen { position:fixed; inset:0; z-index:9; background:#000; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:32px; text-align:center; }
#errScreen.show { display:flex; }
#errScreen p { color:rgba(255,255,255,.7); line-height:1.6; font-family:sans-serif; font-size:14px; }
#retryBtn { background:var(--accent); color:#000; border:none; border-radius:12px; padding:14px 32px; font-size:1rem; font-weight:700; cursor:pointer; }

/* ══════════════════════════════════════════════
   EDGE PANELS – all controls stay at screen edge
   ══════════════════════════════════════════════ */

/* ── Top bar ── */
#topBar { position:absolute; top:0; left:0; right:0; height:52px;
  display:flex; align-items:center; justify-content:space-between; padding:0 12px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.55), transparent); pointer-events:none; }
#topBar > * { pointer-events:auto; }

#profileBtn { background:var(--panel); border:1px solid var(--border); border-radius:10px;
  padding:7px 12px; color:#fff; font-size:12px; cursor:pointer; font-family:monospace; }

/* Level – top centre */
#levelWrap { display:flex; flex-direction:column; align-items:center; gap:3px; pointer-events:none; }
#levelTrack { position:relative; width:120px; height:16px; background:rgba(0,0,0,.5);
  border-radius:8px; border:1px solid rgba(255,255,255,.2); }
#levelCenter { position:absolute; left:50%; top:0; bottom:0; width:1.5px;
  background:rgba(255,255,255,.35); transform:translateX(-50%); }
#levelBubble { position:absolute; top:2px; width:12px; height:12px; border-radius:50%;
  background:#3DDC84; transition:left .1s, background .2s; transform:translateX(-50%); left:50%; }
#levelVal { font-size:9px; color:#3DDC84; font-family:monospace; }

/* Distance badge – top right */
#distBadge { background:var(--panel); border-radius:10px; border:1.5px solid var(--border);
  padding:5px 12px; display:flex; align-items:baseline; gap:3px; cursor:pointer; }
#distVal  { font-size:22px; font-weight:700; color:var(--accent); font-family:monospace; }
#distUnit { font-size:11px; color:rgba(255,255,255,.5); }

/* ── Bottom bar ── */
#bottomBar { position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top, rgba(0,0,0,0.65), transparent);
  padding:8px 8px 20px; display:flex; justify-content:space-around; align-items:center; gap:4px; }
.tog { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  width:44px; height:48px; border-radius:10px; border:1.5px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.45); color:rgba(255,255,255,.75); cursor:pointer; font-size:8px;
  font-family:monospace; transition:all .15s; }
.tog .icon { font-size:16px; line-height:1; }
.tog.on { background:var(--accent); border-color:var(--accent); color:#000; }

/* ── Left edge: zoom ── */
#zoomPanel { position:absolute; left:8px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.1); border-radius:16px;
  padding:10px 6px; }
#zoomPanel button { width:34px; height:34px; border-radius:8px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#zoomSlider { writing-mode:vertical-lr; direction:rtl; -webkit-appearance:slider-vertical;
  width:26px; height:100px; accent-color:var(--accent); cursor:pointer; }
#zoomVal { font-size:10px; color:var(--accent); font-weight:700; font-family:monospace; }

/* ── Right edge: lock + pin controls ── */
#rightPanel { position:absolute; right:8px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.1); border-radius:16px;
  padding:10px 6px; }

/* Lock button */
#lockBtn { width:44px; height:44px; border-radius:12px; border:2px solid var(--border);
  background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:22px; transition:all .2s; }
#lockBtn.unlocked { background:rgba(201,255,61,.15); border-color:var(--accent); }

/* Pin selector (edit mode only) */
#pinSelector { display:none; flex-direction:column; gap:6px; align-items:center; }
#pinSelector.show { display:flex; }
.pinDot { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  transition:all .15s; flex-shrink:0; }
.pinDot.selected { border-color:#fff; transform:scale(1.25); }

/* Pin vertical adjust buttons */
#pinAdjust { display:none; flex-direction:column; gap:4px; align-items:center; }
#pinAdjust.show { display:flex; }
#pinAdjust button { width:34px; height:34px; border-radius:8px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* Horizontal axis shift (edit mode) */
#axisShift { display:none; flex-direction:column; gap:4px; align-items:center; margin-top:4px; }
#axisShift.show { display:flex; }
#axisShift .lbl { font-size:8px; color:rgba(255,255,255,.4); text-align:center; }
#axisShift button { width:34px; height:30px; border-radius:8px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.7); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* Mini view */
#miniWrap { position:absolute; right:70px; bottom:76px; width:82px; height:82px;
  border-radius:10px; overflow:hidden; border:2px solid rgba(255,255,255,.3); }
#miniCanvas { width:100%; height:100%; display:block; }
#miniLabel  { position:absolute; top:2px; left:3px; font-size:8px;
  background:rgba(0,0,0,.55); color:rgba(255,255,255,.7); padding:1px 3px; border-radius:3px; pointer-events:none; }

/* Edit mode indicator (top – just a subtle bar, NOT centre screen) */
#editBar { position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--accent); display:none; pointer-events:none; }
#editBar.show { display:block; }

/* Sheet */
#sheet { position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.65); display:none; align-items:flex-end; }
#sheet.open { display:flex; }
#sheetBox { width:100%; max-height:78dvh; overflow-y:auto; background:#1a1a1a;
  border-radius:20px 20px 0 0; padding:16px 16px 36px; border:1px solid rgba(255,255,255,.08); }
#sheetBox h2 { color:#fff; font-size:15px; font-weight:600; margin-bottom:12px; font-family:sans-serif; }
.sheetClose { float:right; background:none; border:none; color:rgba(255,255,255,.55); font-size:22px; cursor:pointer; }
.sheetRow { display:flex; justify-content:space-between; align-items:center;
  background:#262626; border-radius:12px; padding:13px 14px; margin-bottom:6px; cursor:pointer; }
.sheetRow span { color:#fff; font-size:14px; font-family:sans-serif; }
.sw { width:44px; height:24px; border-radius:12px; background:#555; position:relative; transition:background .2s; flex-shrink:0; }
.sw.on { background:var(--accent); }
.sw::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .2s; }
.sw.on::after { left:22px; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>BOGENSCOPE</h1>
  <p>Digitales Visier für Compound- und Recurvebögen.<br>Benötigt Kamerazugriff.</p>
  <button id="startBtn">Kamera starten</button>
</div>
<div id="errScreen">
  <p id="errMsg"></p>
  <button id="retryBtn">Erneut versuchen</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="vignette"></div>

<div id="ui">

  <!-- Edit mode accent bar (top edge, not centre) -->
  <div id="editBar"></div>

  <!-- Top bar -->
  <div id="topBar">
    <div id="profileBtn" onclick="openSheet('settings')">Compound – Jagd ▾</div>
    <div id="levelWrap">
      <div id="levelTrack"><div id="levelCenter"></div><div id="levelBubble"></div></div>
      <div id="levelVal">0.0°</div>
    </div>
    <div id="distBadge" onclick="openSheet('pins')">
      <span id="distVal">30</span><span id="distUnit">m</span>
    </div>
  </div>

  <!-- Left: zoom -->
  <div id="zoomPanel">
    <button onclick="changeZoom(1)">+</button>
    <input id="zoomSlider" type="range" min="1" max="20" step="0.5" value="1"
           oninput="setZoom(parseFloat(this.value))">
    <button onclick="changeZoom(-1)">−</button>
    <div id="zoomVal">1x</div>
  </div>

  <!-- Right: lock + edit controls -->
  <div id="rightPanel">

    <!-- Lock/Unlock button -->
    <div id="lockBtn" onclick="toggleEdit()" title="Einschießen">🔒</div>

    <!-- Pin selector (edit mode) -->
    <div id="pinSelector">
      <!-- filled dynamically -->
    </div>

    <!-- Pin vertical adjust -->
    <div id="pinAdjust">
      <button onpointerdown="startAdj(1)"  onpointerup="stopAdj" onpointerleave="stopAdj">▲</button>
      <button onpointerdown="startAdj(-1)" onpointerup="stopAdj" onpointerleave="stopAdj">▼</button>
    </div>

    <!-- Horizontal axis shift -->
    <div id="axisShift">
      <span class="lbl">Achse</span>
      <button onpointerdown="startAxisShift(-1)" onpointerup="stopAdj" onpointerleave="stopAdj">◀</button>
      <button onpointerdown="startAxisShift(1)"  onpointerup="stopAdj" onpointerleave="stopAdj">▶</button>
    </div>

  </div>

  <!-- Mini view -->
  <div id="miniWrap">
    <canvas id="miniCanvas"></canvas>
    <div id="miniLabel">3x</div>
  </div>

  <!-- Bottom toggle bar -->
  <div id="bottomBar">
    <div class="tog on" id="tog-cross"  onclick="tog('cross')" ><span class="icon">✛</span>Kreuz</div>
    <div class="tog on" id="tog-circle" onclick="tog('circle')"><span class="icon">○</span>Kreis</div>
    <div class="tog on" id="tog-point"  onclick="tog('point')" ><span class="icon">◎</span>Punkt</div>
    <div class="tog on" id="tog-pins"   onclick="tog('pins')"  ><span class="icon">📍</span>Pins</div>
    <div class="tog on" id="tog-level"  onclick="tog('level')" ><span class="icon">⊟</span>Level</div>
    <div class="tog on" id="tog-mini"   onclick="tog('mini')"  ><span class="icon">▣</span>Mini</div>
  </div>

</div><!-- /ui -->

<!-- Sheet -->
<div id="sheet" onclick="closeSheet()">
  <div id="sheetBox" onclick="event.stopPropagation()">
    <div id="sheetContent"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const DISTANCES = [10,20,30,40,50,60];
const COLORS    = {10:'#FF4136',20:'#FF8C00',30:'#FFD60A',40:'#2ECC71',50:'#2E86FF',60:'#B14EFF'};

// Default pin offsets (normalised Y, 0=top, 1=bottom of canvas)
// All pins share the same X axis (axisX, normalised).
const DEFAULT_OFFSETS = {10:0.65, 20:0.58, 30:0.50, 40:0.42, 50:0.35, 60:0.28};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let cfg = {
  axisX:   0.50,   // normalised horizontal position of pin axis (0-1)
  offsets: {...DEFAULT_OFFSETS},  // { [dist]: normY }
  activePin: 30,
};

// Load saved
try {
  const sv = localStorage.getItem('bs_cfg1');
  if (sv) { const p=JSON.parse(sv); cfg.axisX=p.axisX??0.50; cfg.offsets=p.offsets??{...DEFAULT_OFFSETS}; }
} catch(e){}
function saveCfg() { try { localStorage.setItem('bs_cfg1', JSON.stringify({axisX:cfg.axisX, offsets:cfg.offsets})); } catch(e){} }

const S = {
  cross:true, circle:true, point:true, pins:true, level:true, mini:true,
  zoom:1, editMode:false, selectedPin:null,
};

// ═══════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const mini   = document.getElementById('miniCanvas');
let videoReady = false;

document.getElementById('startBtn').onclick = startCamera;
document.getElementById('retryBtn').onclick  = ()=>{ document.getElementById('errScreen').classList.remove('show'); startCamera(); };

async function startCamera() {
  document.getElementById('startScreen').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment', width:{ideal:1920}, height:{ideal:1080}}, audio:false });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', ()=>{ videoReady=true; }, {once:true});
    await video.play();
    document.getElementById('ui').style.display = 'block';
    resizeCanvas();
    requestAnimationFrame(drawLoop);
    initSensors();
    initPinchZoom();
    initPinDrag();
    updateDistBadge();
    buildPinSelector();
  } catch(e) {
    document.getElementById('errMsg').textContent = 'Kamerazugriff nicht möglich: ' + e.message;
    document.getElementById('errScreen').classList.add('show');
  }
}

// ═══════════════════════════════════════════════════════════
// CANVAS / DRAW
// ═══════════════════════════════════════════════════════════
function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resizeCanvas);

function drawLoop() {
  requestAnimationFrame(drawLoop);
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // 1. Video crop = zoom
  const vw=video.videoWidth, vh=video.videoHeight;
  if (videoReady && vw && vh) {
    const z=S.zoom, cw=vw/z, ch=vh/z;
    ctx.drawImage(video, (vw-cw)/2,(vh-ch)/2,cw,ch, 0,0,W,H);
  }

  // 2. Scope overlays
  const cx=W/2, cy=H*0.44, r=Math.min(cx*0.86,cy*0.86);

  if (S.circle) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(201,255,61,.88)'; ctx.lineWidth=1.8; ctx.stroke();
  }
  if (S.cross) {
    const g=18;
    ctx.strokeStyle='rgba(201,255,61,.88)'; ctx.lineWidth=1.5;
    [[cx-r,cy,cx-g,cy],[cx+g,cy,cx+r,cy],[cx,cy-r,cx,cy-g],[cx,cy+g,cx,cy+r]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
    ctx.strokeStyle='rgba(201,255,61,.45)'; ctx.lineWidth=1;
    [.3,.6,.82].forEach(f=>{[cx+r*f,cx-r*f].forEach(x=>{
      ctx.beginPath(); ctx.moveTo(x,cy-4); ctx.lineTo(x,cy+4); ctx.stroke(); }); });
  }
  if (S.point) {
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='#C9FF3D'; ctx.fill();
  }

  // 3. Pins – all on axisX, vertical positions from offsets
  if (S.pins) {
    const ax = cfg.axisX * W;   // pixel X of the shared axis

    // In edit mode: draw the axis line
    if (S.editMode) {
      ctx.strokeStyle='rgba(201,255,61,.25)';
      ctx.lineWidth=1; ctx.setLineDash([6,6]);
      ctx.beginPath(); ctx.moveTo(ax,0); ctx.lineTo(ax,H); ctx.stroke();
      ctx.setLineDash([]);
    }

    DISTANCES.forEach(d => {
      const oy = cfg.offsets[d] ?? DEFAULT_OFFSETS[d];
      const px = ax;
      const py = oy * H;
      const col = COLORS[d];
      const isActive   = cfg.activePin === d;
      const isSelected = S.editMode && S.selectedPin === d;

      // Pin dot
      const rad = isActive ? 7 : 5;
      ctx.beginPath(); ctx.arc(px,py,rad,0,Math.PI*2);
      ctx.fillStyle = col; ctx.fill();

      // Ring for active pin
      if (isActive) {
        ctx.beginPath(); ctx.arc(px,py,11,0,Math.PI*2);
        ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=2; ctx.stroke();
      }
      // Highlight for selected (edit mode)
      if (isSelected) {
        ctx.beginPath(); ctx.arc(px,py,14,0,Math.PI*2);
        ctx.strokeStyle=col; ctx.lineWidth=2;
        ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
      }

      // Label
      ctx.font=`${isActive?'bold ':''} ${isActive?12:10}px monospace`;
      ctx.fillStyle=col; ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=4;
      ctx.fillText(d+'m', px+14, py+4); ctx.shadowBlur=0;
    });
  }

  // 4. Mini view (3x crop, always zoom=3 independent of main zoom)
  const mc=mini; mc.width=mc.offsetWidth||82; mc.height=mc.offsetHeight||82;
  const mctx=mc.getContext('2d');
  if (videoReady && vw && vh) {
    const mz=3, mcw=vw/mz, mch=vh/mz;
    mctx.drawImage(video,(vw-mcw)/2,(vh-mch)/2,mcw,mch,0,0,mc.width,mc.height);
  }
  mctx.strokeStyle='rgba(201,255,61,.8)'; mctx.lineWidth=1;
  mctx.beginPath(); mctx.moveTo(0,mc.height/2); mctx.lineTo(mc.width,mc.height/2); mctx.stroke();
  mctx.beginPath(); mctx.moveTo(mc.width/2,0); mctx.lineTo(mc.width/2,mc.height); mctx.stroke();
}

// ═══════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════
function changeZoom(d) { setZoom(S.zoom+d); }
function setZoom(z) {
  S.zoom=Math.max(1,Math.min(20,parseFloat(z.toFixed(1))));
  document.getElementById('zoomSlider').value=S.zoom;
  document.getElementById('zoomVal').textContent=S.zoom.toFixed(1)+'x';
}
function initPinchZoom() {
  let sd=0,sz=1;
  document.addEventListener('touchstart',e=>{ if(e.touches.length===2){ sd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); sz=S.zoom; }},{passive:true});
  document.addEventListener('touchmove',e=>{ if(e.touches.length!==2) return; const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); setZoom(Math.round(sz*(d/sd)*2)/2); },{passive:true});
}

// ═══════════════════════════════════════════════════════════
// EDIT MODE
// ═══════════════════════════════════════════════════════════
function toggleEdit() {
  S.editMode = !S.editMode;
  const btn = document.getElementById('lockBtn');
  btn.textContent  = S.editMode ? '🔓' : '🔒';
  btn.classList.toggle('unlocked', S.editMode);
  document.getElementById('editBar').classList.toggle('show', S.editMode);
  document.getElementById('pinSelector').classList.toggle('show', S.editMode);
  document.getElementById('pinAdjust').classList.toggle('show', S.editMode && S.selectedPin!==null);
  document.getElementById('axisShift').classList.toggle('show', S.editMode);
  if (!S.editMode) { saveCfg(); S.selectedPin=null; }
}

function buildPinSelector() {
  const el = document.getElementById('pinSelector');
  el.innerHTML = DISTANCES.map(d=>
    `<div class="pinDot ${S.selectedPin===d?'selected':''}"
       style="background:${COLORS[d]}"
       onclick="selectPin(${d})"></div>`
  ).join('');
}

function selectPin(d) {
  if (!S.editMode) return;
  S.selectedPin = d;
  cfg.activePin = d;
  buildPinSelector();
  document.getElementById('pinAdjust').classList.toggle('show', true);
  updateDistBadge();
}

// Continuous adjustment while finger held
let adjInterval = null;
function startAdj(dir) {
  if (!S.selectedPin) return;
  doAdj(dir);
  adjInterval = setInterval(()=>doAdj(dir), 80);
}
function doAdj(dir) {
  if (!S.selectedPin) return;
  const step = 0.003;
  cfg.offsets[S.selectedPin] = Math.max(0.05, Math.min(0.95,
    (cfg.offsets[S.selectedPin]??DEFAULT_OFFSETS[S.selectedPin]) + dir*step));
}
function stopAdj() { clearInterval(adjInterval); adjInterval=null; }

// Axis shift (all pins move together horizontally)
function startAxisShift(dir) {
  doAxisShift(dir);
  adjInterval = setInterval(()=>doAxisShift(dir), 80);
}
function doAxisShift(dir) {
  cfg.axisX = Math.max(0.05, Math.min(0.95, cfg.axisX + dir*0.003));
}

// ═══════════════════════════════════════════════════════════
// PIN DRAG (touch drag on canvas in edit mode)
// ═══════════════════════════════════════════════════════════
function initPinDrag() {
  canvas.style.pointerEvents = 'auto';
  let dragging = null, startY = 0, startOy = 0;

  canvas.addEventListener('touchstart', e => {
    if (!S.editMode || e.touches.length!==1) return;
    const t=e.touches[0];
    const W=canvas.width, H=canvas.height;
    const ax=cfg.axisX*W;
    // Find nearest pin within tap radius
    let best=null, bestD=999;
    DISTANCES.forEach(d=>{
      const py=(cfg.offsets[d]??DEFAULT_OFFSETS[d])*H;
      const dist=Math.hypot(t.clientX-ax, t.clientY-py);
      if (dist<40 && dist<bestD) { bestD=dist; best=d; }
    });
    if (best!==null) {
      dragging=best; startY=t.clientY;
      startOy=cfg.offsets[best]??DEFAULT_OFFSETS[best];
      selectPin(best);
      e.preventDefault();
    }
  },{passive:false});

  canvas.addEventListener('touchmove', e => {
    if (dragging===null || e.touches.length!==1) return;
    e.preventDefault();
    const dy=e.touches[0].clientY - startY;
    cfg.offsets[dragging]=Math.max(0.05,Math.min(0.95, startOy+dy/canvas.height));
  },{passive:false});

  canvas.addEventListener('touchend', ()=>{ dragging=null; });
}

// ═══════════════════════════════════════════════════════════
// SENSORS
// ═══════════════════════════════════════════════════════════
function initSensors() {
  if (!window.DeviceMotionEvent) return;
  if (typeof DeviceMotionEvent.requestPermission==='function')
    DeviceMotionEvent.requestPermission().catch(()=>{});
  let sm=0;
  window.addEventListener('devicemotion', e=>{
    const a=e.accelerationIncludingGravity; if(!a) return;
    sm=sm*0.95+Math.atan2(a.x,a.z)*(180/Math.PI)*0.05;
    const ok=Math.abs(sm)<3, col=ok?'#3DDC84':'#FFB000';
    const frac=Math.max(-1,Math.min(1,sm/15));
    document.getElementById('levelBubble').style.left=(50+frac*41)+'%';
    document.getElementById('levelBubble').style.background=col;
    const lv=document.getElementById('levelVal');
    lv.textContent=(sm>=0?'+':'')+sm.toFixed(1)+'°'; lv.style.color=col;
  });
}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function updateDistBadge() {
  const el=document.getElementById('distVal');
  el.textContent=cfg.activePin;
  el.style.color=COLORS[cfg.activePin]||'var(--accent)';
  document.getElementById('distBadge').style.borderColor=(COLORS[cfg.activePin]||'var(--accent)')+'99';
}

function tog(key) {
  S[key]=!S[key];
  document.getElementById('tog-'+key).classList.toggle('on',S[key]);
  if(key==='level') document.getElementById('levelWrap').style.display=S.level?'':'none';
  if(key==='mini')  document.getElementById('miniWrap').style.display=S.mini?'':'none';
}

function openSheet(type) {
  const c=document.getElementById('sheetContent');
  if (type==='settings') {
    c.innerHTML=`<button class="sheetClose" onclick="closeSheet()">✕</button><h2>Overlays</h2>`+
      [['cross','Fadenkreuz'],['circle','Scope-Kreis'],['point','Zielpunkt'],
       ['pins','Distanz-Pins'],['level','Wasserwaage'],['mini','Miniaturansicht']]
      .map(([k,l])=>`<div class="sheetRow" onclick="tog('${k}');openSheet('settings')">
        <span>${l}</span><div class="sw ${S[k]?'on':''}"></div></div>`).join('');
  } else if (type==='pins') {
    c.innerHTML=`<button class="sheetClose" onclick="closeSheet()">✕</button><h2>Aktiver Pin</h2>`+
      DISTANCES.map(d=>`
        <div class="sheetRow ${cfg.activePin===d?'':''}">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:14px;height:14px;border-radius:50%;background:${COLORS[d]};flex-shrink:0"></div>
            <span>${d} m</span>
          </div>
          <button onclick="setActivePin(${d})" style="background:${cfg.activePin===d?'var(--accent)':'#333'};
            color:${cfg.activePin===d?'#000':'#fff'};border:none;border-radius:8px;
            padding:6px 14px;font-size:13px;cursor:pointer;font-family:sans-serif">
            ${cfg.activePin===d?'AKTIV':'Wählen'}
          </button>
        </div>`).join('');
  }
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() { document.getElementById('sheet').classList.remove('open'); }
function setActivePin(d) { cfg.activePin=d; updateDistBadge(); closeSheet(); }
</script>
